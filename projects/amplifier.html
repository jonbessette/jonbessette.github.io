<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Amplifier | J. T.-Y. Bessette</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        h1, h2, h3, .serif { font-family: 'DM Serif Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        body { font-family: 'Inter', sans-serif; }
        .border-thin { border: 0.5px solid #e5e7eb; }
        .hero-crop { object-position: 50% 50%; }

        .zoomable { cursor: zoom-in; transition: opacity 0.3s; }
        .zoomable:hover { opacity: 0.8; }
        
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-white text-black antialiased">

    <nav class="fixed w-full z-50 mix-blend-difference text-white px-6 md:px-12 py-8 flex justify-between items-center">
        <a href="../index.html" class="mono text-[10px] tracking-[0.4em] uppercase hover:opacity-50 transition">← Back</a>
        </nav>

    <header class="h-[70vh] w-full bg-black relative flex items-center justify-center overflow-hidden">
        <img src="../images/amplifier/finished.JPG" class="absolute inset-0 w-full h-full object-cover grayscale opacity-60 hero-crop" alt="Audio Amplifier Hero">
        <div class="absolute inset-0 hero-overlay bg-black/30"></div>
        <div class="relative z-10 text-center px-6">
            <h1 class="text-white text-5xl md:text-7xl serif italic leading-tight">Class-D Audio Amplifier</h1>
            <p class="mono text-white text-[10px] tracking-[0.5em] uppercase opacity-80 mt-4">Analog Electronics</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 md:px-12 py-24">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-16">
            
            <div class="md:col-span-7">
                <section class="mb-12">
                    <h3 class="serif text-3xl mb-4 italic">The Project</h3>
                    <p class="text-xl font-light leading-relaxed text-gray-800">
                        A custom-built analog class-D audio amplifier featuring a hand-soldered PCB. This project focused on analog design and minimizing signal noise (still pretty noisy... but I was happy it worked with my aux cord!) 
                    </p>
                </section>
            </div>

            <div class="md:col-span-5 gallery-container">
                <div class="sticky top-32 space-y-8 Gallery_Content">
                    
                    <img src="../images/amplifier/finished.JPG" onclick="openModal(this.src)" class="zoomable w-full grayscale hover:grayscale-0 transition border border-thin" alt="Final Assembly">

                    <div class="border border-thin bg-black aspect-video flex items-center">
                        <video controls class="w-full grayscale hover:grayscale-0 transition">
                            <source src="../images/amplifier/demo.mp4" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>

                    <img src="../images/amplifier/top.JPG" onclick="openModal(this.src)" class="zoomable w-full grayscale hover:grayscale-0 transition border border-thin" alt="Top View">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <img src="../images/amplifier/closeup.JPG" onclick="openModal(this.src)" class="zoomable w-full grayscale hover:grayscale-0 transition border border-thin" alt="Internal Detail">
                        <img src="../images/amplifier/plan.JPG" onclick="openModal(this.src)" class="zoomable w-full grayscale hover:grayscale-0 transition border border-thin" alt="Project Plan">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" onclick="closeModal()">
        <img id="modal-img" class="max-h-[90vh] max-w-[90vw] object-contain shadow-2xl" alt="Zoomed view">
    </div>

    <footer class="px-6 py-12 border-t border-thin text-center">
        <a href="../index.html" class="mono text-[10px] text-gray-400 uppercase tracking-[0.5em] hover:text-black transition">Return to Portfolio</a>
    </footer>

    <script>
        function openModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>

</body>
</html>
